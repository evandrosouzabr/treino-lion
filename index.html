<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Treino - Lion Training</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #121214; color: #e1e1e6; }
        .card-checkbox:checked + label { text-decoration: line-through; color: #8d8d99; }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .collapsible-content.open { max-height: 300px; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-28">

    <header class="flex justify-between items-center bg-[#202024] p-4 rounded-xl mb-6 border border-[#323238]">
        <div>
            <h1 class="text-xl font-bold text-[#e1e1e6]">Evandro Jr</h1>
            <p class="text-sm text-[#00b37e]"><i class="fa-solid fa-dumbbell mr-1"></i> Lion Training</p>
        </div>
        <div class="text-right">
            <p id="current-date" class="text-sm font-semibold text-[#c4c4cc]"></p>
            <p id="training-day-label" class="text-xs text-[#8d8d99] font-medium uppercase mt-1"></p>
        </div>
    </header>

    <div id="view-train">
        <div class="flex gap-2 mb-6">
            <button onclick="switchTab('A')" id="btn-tab-A" class="flex-1 py-2 rounded-lg bg-[#202024] text-sm font-bold border border-[#323238] transition-colors">Treino A</button>
            <button onclick="switchTab('B')" id="btn-tab-B" class="flex-1 py-2 rounded-lg bg-[#202024] text-sm font-bold border border-[#323238] transition-colors">Treino B</button>
            <button onclick="switchTab('C')" id="btn-tab-C" class="flex-1 py-2 rounded-lg bg-[#202024] text-sm font-bold border border-[#323238] transition-colors">Treino C</button>
        </div>

        <main id="exercise-list" class="space-y-3 mb-6">
            </main>

        <div class="p-1">
            <button id="btn-checkin" onclick="toggleDailyCheckin()" class="w-full bg-[#00875f] hover:bg-[#00b37e] text-white font-bold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-black/40">
                <i class="fa-regular fa-circle-check text-lg"></i>
                <span>Concluir Treino de Hoje</span>
            </button>
        </div>
    </div>

    <div id="view-history" class="hidden space-y-4">
        <div class="bg-[#202024] p-4 rounded-xl border border-[#323238]">
            <div class="flex justify-between items-center mb-2">
                <h2 id="calendar-title" class="text-base font-bold text-[#e1e1e6]"><i class="fa-solid fa-calendar-days text-[#00b37e] mr-2"></i>Histórico Mensal</h2>
                <span class="text-xs bg-[#29292e] text-[#00b37e] px-2 py-0.5 rounded-md font-mono" id="stats-counter">0/0</span>
            </div>
            <p class="text-xs text-[#8d8d99] mb-4">Toque num dia passado para editar ou eliminar o registo de treino.</p>
            
            <div class="grid grid-cols-7 gap-1.5 text-center text-[11px] font-bold text-[#8d8d99] mb-2 uppercase">
                <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
            </div>
            
            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5">
                </div>
        </div>
    </div>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-[#202024] border border-[#323238] rounded-2xl w-full max-w-xs p-5 shadow-2xl space-y-4">
            <div>
                <h3 id="modal-date-title" class="font-bold text-base text-[#e1e1e6]">Editar Dia</h3>
                <p id="modal-subtitle" class="text-xs text-[#8d8d99] mt-0.5"></p>
            </div>
            <div class="flex flex-col gap-2 pt-2">
                <button onclick="saveModalCheckin(true)" class="w-full bg-[#00875f] hover:bg-[#00b37e] text-white font-bold py-2.5 rounded-xl text-sm flex items-center justify-center gap-2 transition-colors">
                    <i class="fa-solid fa-check"></i> Marcar como Treinado
                </button>
                <button onclick="saveModalCheckin(false)" class="w-full bg-[#f75a68]/10 hover:bg-[#f75a68]/20 text-[#f75a68] border border-[#f75a68]/30 font-bold py-2.5 rounded-xl text-sm flex items-center justify-center gap-2 transition-colors">
                    <i class="fa-regular fa-trash-can"></i> Limpar / Eliminar Registo
                </button>
                <button onclick="closeModal()" class="w-full bg-[#29292e] hover:bg-[#323238] text-[#c4c4cc] font-medium py-2 rounded-xl text-sm mt-2 transition-colors">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#202024] border-t border-[#323238] px-6 py-2 flex justify-around backdrop-blur-md">
        <button onclick="changeView('train')" id="nav-train" class="flex flex-col items-center gap-1 text-[#00b37e] text-xs font-semibold py-1">
            <i class="fa-solid fa-clipboard-list text-xl"></i>
            <span>Treinar</span>
        </button>
        <button onclick="changeView('history')" id="nav-history" class="flex flex-col items-center gap-1 text-[#8d8d99] text-xs font-semibold py-1">
            <i class="fa-solid fa-calendar-days text-xl"></i>
            <span>Histórico</span>
        </button>
    </nav>

    <script>
        // Mapeamento atualizado com imagens estáveis de alta definição
        const linksImagens = {
            "Mobilidade": "https://media.giphy.com/media/PiXs26s4cC97mVwijc/giphy.gif",
            "Flexão de Solo": "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExazlneGE2MmpoNG01OTZtN2l3YWV0bnppN2I2eW1mdXZoODg4emsxeSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3ohze1qkqPZHMrEuwo/giphy.gif",
            "Supino Rêto Barra + Supino Rêto Halter": "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExcmp4bDdmbTl6b3F1M3J5ZGloemttNnZuenR5N2Exb291NDBlcXg2aSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/cKPsQVloxwsPgbpamd/giphy.gif",
            "Fly (Peck Deck)": "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXc3N3Rkc2w2b3oyZHJxc3lvbnFwbDBpcjdubHQ3emdycWQ5djNzbiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3n1J7hJGOoMWnseuMq/giphy.gif",
            "Supino Articulado": "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExNGR4enM3eWF5cmRsZjY1aDNwdHNtNXdhZHpvMTRtbmV5aDFjZ3N1YSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/vv1Ybwh3SKwwDNjmEj/giphy.gif",
            "Supino Inclinado Articulado": "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExcGh3a3Y2ZGduMml3OGJtbGtyejRpamZncnlmMmI4a3I1NzRuOGp5ZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/vv1Ybwh3SKwwDNjmEj/giphy.gif",
            "Tríceps Rêto": "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExZHJhdDlwMDFkcDdob2hvbmNqd2R2ZDI1aHdmc2Q2bHdudXRlM29rZiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/ZcWuTS32XPwf2JxJe2/giphy.gif",
            "Tríceps Testa": "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExYmxqdWY2YjF0cHR4dGY5NmMxaTdyaXRxZmh5MndzcGQ0eXR6N2Z3OCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/MdmZmDk6MeCtZNKfWM/giphy.gif",
            "Elevação Frontal": "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExbTU5Y2I4cG9rdGhodnZqMGZuNWlqbXdiYmtlZGxmeXZwNXpyNGpscyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/zc8CJZGmlXi7mCVSac/giphy.gif",
            "Puxada Frontal": "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExbTlyeHZ3MGpkdXJkdWxqbXYwMTRwZjJ3Z2VoaGE5YXR6Yml0ZjI5NyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/IpX7IpR2SzDMtQza2p/giphy.gif",
            "Remada Máquina": "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExa3B2b3hqM3o5NnRsZDk5dXp5dXFwamkyaG92cjFuamNvdTh6eWgwZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/0mhHK2Tkcxxf2mwaR6/giphy.gif",
            "Puxada Articulada": "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExdXp6OGxjbnpxZDN6NmowdDEwYTY4MjB6aXVpajV1MTZvejRvanhreSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/tDxuU7SJlbiQIDLKc3/giphy.gif",
            "Remada Frontal Triângulo": "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExbDN4d3NxeG40ODE5NG11aG5ubG13NW40bWEwbnM2cGxiNjU1Z2RreCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/0mhHK2Tkcxxf2mwaR6/giphy.gif",
            "Rosca Máquina": "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExdDUxdTNqZ3d1OXp6YmNpN2piZmM4eXJwZXkzOWxoODU5YXc2M2JsYiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/WsFX0H7qz5M1o8VpxH/giphy.gif",
            "Tríceps Pulley": "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExYXdvMzBtazF0bGpkMWRqaWJiZTAwaGFsbDJtbTl6dzVhdnp6bDZ6OSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/ZcWuTS32XPwf2JxJe2/giphy.gif",
            "Rosca Unilateral Polia": "https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExZzlhZnRrOHE4eDdzazFibjhwdmRpcm95bjFodDA4NG9zZjB3NDAwdSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/4stDgQjIn8CnC8Q7XD/giphy.gif",
            "Abs. Prancha": "https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExNmlvcDBmcnBkMnlyOHU4cnJmNWk5MnBxOWx3OWMyczhvcHRjOTE3ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/xIQKDKVYvtipesfWFD/giphy.gif",
            "Cadeira Extensora": "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=500&q=80",
            "Cadeira Adutora": "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=500&q=80",
            "Cadeira Abdutora": "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=500&q=80",
            "Leg 180": "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=500&q=80",
            "Cadeira Flexora": "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=500&q=80",
            "Panturrilha": "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=500&q=80",
            "Desenvolvimento Máquina": "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?w=500&q=80",
            "Remada Alta Barra": "https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=500&q=80",
            "Elevação Lateral Unilateral": "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?w=500&q=80"
        };

        const treinos = {
            'A': { nome: "Peito, Tríceps & Mobilidade", dias: "Segunda e Quinta", exercicios: [
                { nome: "Mobilidade", series: "1", reps: "Livre" }, 
                { nome: "Flexão de Solo", series: "3", reps: "12" },
                { nome: "Supino Rêto Barra + Supino Rêto Halter", series: "3", reps: "12" }, 
                { nome: "Fly (Peck Deck)", series: "3", reps: "12" },
                { nome: "Supino Articulado", series: "3", reps: "12" }, 
                { nome: "Supino Inclinado Articulado", series: "3", reps: "12" }, 
                { nome: "Tríceps Rêto", series: "3", reps: "12" },
                { nome: "Tríceps Testa", series: "3", reps: "12" },
                { nome: "Elevação Frontal", series: "3", reps: "12" }
            ]},
            'B': { nome: "Costas, Bíceps & Abdômen", dias: "Terça e Sexta", exercicios: [
                { nome: "Mobilidade", series: "1", reps: "Livre" }, { nome: "Puxada Frontal", series: "3", reps: "12" },
                { nome: "Remada Máquina", series: "3", reps: "12" }, { nome: "Puxada Articulada", series: "3", reps: "12" },
                { nome: "Remada Frontal Triângulo", series: "3", reps: "12" }, { nome: "Rosca Máquina", series: "3", reps: "12" },
                { nome: "Tríceps Pulley", series: "3", reps: "12" }, { nome: "Rosca Unilateral Polia", series: "3", reps: "12" },
                { nome: "Abs. Prancha", series: "3", reps: "Isometria" }
            ]},
            'C': { nome: "Pernas & Ombros", dias: "Quarta e Sábado", exercicios: [
                { nome: "Mobilidade", series: "1", reps: "Livre" }, { nome: "Cadeira Extensora", series: "3", reps: "12" },
                { nome: "Cadeira Adutora", series: "3", reps: "12" }, { nome: "Cadeira Abdutora", series: "3", reps: "12" },
                { nome: "Leg 180", series: "3", reps: "12" }, { nome: "Cadeira Flexora", series: "3", reps: "12" },
                { nome: "Panturrilha", series: "3", reps: "12" }, { nome: "Desenvolvimento Máquina", series: "3", reps: "12" },
                { nome: "Remada Alta Barra", series: "3", reps: "12" }, { nome: "Elevação Lateral Unilateral", series: "3", reps: "12" }
            ]}
        };

        let abaAtual = 'A';
        let dataSelecionadaModal = null;

        function obterLetraTreinoPorDia(diaSemana) {
            if (diaSemana === 1 || diaSemana === 4) return 'A';
            if (diaSemana === 2 || diaSemana === 5) return 'B';
            if (diaSemana === 3 || diaSemana === 6) return 'C';
            return '-'; 
        }

        function obterTreinoDoDia() {
            const diaSemana = new Date().getDay();
            const letra = obterLetraTreinoPorDia(diaSemana);
            return letra === '-' ? 'A' : letra;
        }

        function formatarData() {
            const opcoes = { day: '2-digit', month: '2-digit', year: 'numeric' };
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', opcoes);
        }

        function toggleCollapse(index) {
            const content = document.getElementById(`collapse-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.className = "fa-solid fa-chevron-down text-xs";
            } else {
                content.classList.add('open');
                icon.className = "fa-solid fa-chevron-up text-xs";
            }
        }

        function switchTab(letraTreino) {
            renderizarTreino(letraTreino);
        }

        function changeView(view) {
            if (view === 'train') {
                document.getElementById('view-train').classList.remove('hidden');
                document.getElementById('view-history').classList.add('hidden');
                document.getElementById('nav-train').className = "flex flex-col items-center gap-1 text-[#00b37e] text-xs font-semibold py-1";
                document.getElementById('nav-history').className = "flex flex-col items-center gap-1 text-[#8d8d99] text-xs font-semibold py-1";
            } else {
                document.getElementById('view-train').classList.add('hidden');
                document.getElementById('view-history').classList.remove('hidden');
                document.getElementById('nav-train').className = "flex flex-col items-center gap-1 text-[#8d8d99] text-xs font-semibold py-1";
                document.getElementById('nav-history').className = "flex flex-col items-center gap-1 text-[#00b37e] text-xs font-semibold py-1";
                renderizarCalendarioMensal();
            }
        }

        function renderizarTreino(letraTreino) {
            abaAtual = letraTreino;
            const treino = treinos[letraTreino];
            document.getElementById('training-day-label').innerText = `Treino ${letraTreino} (${treino.dias})`;
            
            ['A', 'B', 'C'].forEach(l => {
                const btn = document.getElementById(`btn-tab-${l}`);
                if (l === letraTreino) {
                    btn.className = "flex-1 py-2 rounded-lg bg-[#00875f] text-white text-sm font-bold border border-transparent transition-colors";
                } else {
                    btn.className = "flex-1 py-2 rounded-lg bg-[#202024] text-[#e1e1e6] text-sm font-bold border border-[#323238] transition-colors";
                }
            });

            const container = document.getElementById('exercise-list');
            container.innerHTML = '';

            treino.exercicios.forEach((ex, index) => {
                const storageKey = `check_${letraTreino}_${index}`;
                const weightKey = `weight_${letraTreino}_${index}`;
                
                const isChecked = localStorage.getItem(storageKey) === 'true' ? 'checked' : '';
                const savedWeight = localStorage.getItem(weightKey) || '';
                const imgUrl = linksImagens[ex.nome] || 'https://images.unsplash.com/photo-1517838277536-f5f99be501cd?w=400';

                const div = document.createElement('div');
                div.className = "bg-[#202024] rounded-xl border border-[#323238] overflow-hidden";
                div.innerHTML = `
                    <div class="p-4 flex items-center justify-between gap-3">
                        <div class="flex items-center gap-3 flex-1 min-w-0">
                            <input type="checkbox" id="${storageKey}" onchange="saveProgress('${storageKey}')" ${isChecked}
                                   class="card-checkbox w-5 h-5 accent-[#00b37e] rounded bg-[#121214] border-[#323238] cursor-pointer shrink-0">
                            <label for="${storageKey}" class="font-semibold text-sm text-[#e1e1e6] cursor-pointer truncate flex-1">${ex.nome}</label>
                        </div>
                        <div class="flex items-center gap-2 shrink-0">
                            <input type="text" id="${weightKey}" value="${savedWeight}" oninput="saveWeight('${weightKey}')" placeholder="Carga" 
                                   class="w-16 bg-[#121214] text-[#e1e1e6] text-xs font-mono px-1.5 py-1 rounded border border-[#323238] text-center focus:outline-none focus:border-[#00b37e]">
                            <span class="text-xs bg-[#29292e] text-[#c4c4cc] px-2 py-1 rounded-md font-mono">${ex.series}x${ex.reps}</span>
                            <button onclick="toggleCollapse(${index})" class="text-[#8d8d99] hover:text-[#e1e1e6] p-1">
                                <i id="icon-${index}" class="fa-solid fa-chevron-down text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <div id="collapse-${index}" class="collapsible-content bg-[#121214]/40 border-t border-[#323238]/50">
                        <div class="p-4 flex justify-center bg-[#121214]">
                            <img src="${imgUrl}" alt="Execução do exercício" class="rounded-lg max-h-48 object-contain bg-black w-full" loading="lazy">
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });

            verificarCheckinDiario();
        }

        function saveProgress(key) {
            const checkbox = document.getElementById(key);
            localStorage.setItem(key, checkbox.checked);
        }

        function saveWeight(key) {
            const input = document.getElementById(key);
            localStorage.setItem(key, input.value);
        }

        function obterChaveCheckinString(dataStr) {
            return `checkin_diario_${dataStr}`;
        }

        function toggleDailyCheckin() {
            const hojeStr = new Date().toISOString().split('T')[0];
            const chave = obterChaveCheckinString(hojeStr);
            const completou = localStorage.getItem(chave) === 'true';
            
            if (!completou) {
                localStorage.setItem(chave, 'true');
                alert('Excelente! Treino concluído e salvo no histórico. Mantenha o foco!');
            } else {
                localStorage.removeItem(chave);
            }
            verificarCheckinDiario();
        }

        function verificarCheckinDiario() {
            const btn = document.getElementById('btn-checkin');
            const icon = btn.querySelector('i');
            const span = btn.querySelector('span');
            const hojeStr = new Date().toISOString().split('T')[0];
            const completou = localStorage.getItem(obterChaveCheckinString(hojeStr)) === 'true';

            if (completou) {
                btn.className = "w-full bg-[#29292e] text-[#00b37e] border border-[#00b37e] font-bold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg";
                icon.className = "fa-solid fa-circle-check text-lg";
                span.innerText = "Treino de Hoje Concluido!";
            } else {
                btn.className = "w-full bg-[#00875f] hover:bg-[#00b37e] text-white font-bold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-lg shadow-black/40";
                icon.className = "fa-regular fa-circle-check text-lg";
                span.innerText = "Concluir Treino de Hoje";
            }
        }

        function renderizarCalendarioMensal() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            const hoje = new Date();
            const ano = hoje.getFullYear();
            const mes =  hoje.getMonth();
            
            const nomeMeses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            document.getElementById('calendar-title').innerHTML = `<i class="fa-solid fa-calendar-days text-[#00b37e] mr-2"></i>${nomeMeses[mes]} de ${ano}`;

            const primeiroDiaMes = new Date(ano, mes, 1).getDay();
            const totalDiasMes = new Date(ano, mes + 1, 0).getDate();
            const hojeStr = hoje.toISOString().split('T')[0];

            let treinosFeitos = 0;
            let diasTreinoPassados = 0;

            for (let i = 0; i < primeiroDiaMes; i++) {
                const vazio = document.createElement('div');
                grid.appendChild(vazio);
            }

            for (let dia = 1; dia <= totalDiasMes; dia++) {
                const dataLoop = new Date(ano, mes, dia);
                const diaSemana = dataLoop.getDay();
                const letraTreino = obterLetraTreinoPorDia(diaSemana);
                
                const offset = dataLoop.getTimezoneOffset();
                const dataLocal = new Date(dataLoop.getTime() - (offset * 60 * 1000));
                const dataStr = dataLocal.toISOString().split('T')[0];

                const completou = localStorage.getItem(obterChaveCheckinString(dataStr)) === 'true';
                const ehHoje = dataStr === hojeStr;
                const ehPassado = dataStr < hojeStr;

                if (letraTreino !== '-') {
                    if (completou) treinosFeitos++;
                    if (ehPassado || ehHoje) diasTreinoPassados++;
                }

                const diaBox = document.createElement('button');
                diaBox.disabled = dataStr > hojeStr;

                let classeEstilo = "h-12 rounded-lg flex flex-col items-center justify-center border font-mono transition-all text-xs ";
                
                if (completou) {
                    classeEstilo += "bg-[#00875f]/20 border-[#00b37e] text-[#00b37e] font-bold";
                } else if (ehHoje) {
                    classeEstilo += "bg-[#29292e] border-white text-white font-bold";
                } else if (ehPassado && letraTreino !== '-') {
                    classeEstilo += "bg-[#f75a68]/10 border-[#f75a68]/40 text-[#f75a68]";
                } else {
                    classeEstilo += "bg-[#121214] border-[#323238] text-[#8d8d99]";
                }

                if (diaBox.disabled) classeEstilo += " opacity-40 cursor-not-allowed";

                diaBox.className = classeEstilo;
                diaBox.innerHTML = `
                    <span class="text-[10px] opacity-60">${dia}</span>
                    <span class="font-bold text-[11px] mt-0.5">${letraTreino}</span>
                `;

                if (!diaBox.disabled) {
                    diaBox.onclick = () => openModal(dataStr, dia, letraTreino);
                }

                grid.appendChild(diaBox);
            }

            document.getElementById('stats-counter').innerText = `${treinosFeitos}/${diasTreinoPassados} concluidos`;
        }

        function openModal(dataStr, dia, letraTreino) {
            dataSelecionadaModal = dataStr;
            const partes = dataStr.split('-');
            document.getElementById('modal-date-title').innerText = `Dia ${dia}/${partes[1]}`;
            document.getElementById('modal-subtitle').innerText = letraTreino !== '-' ? `Treino previsto: ${letraTreino}` : 'Nenhum treino regular previsto';
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            dataSelecionadaModal = null;
        }

        function saveModalCheckin(status) {
            if (!dataSelecionadaModal) return;
            
            const chave = obterChaveCheckinString(dataSelecionadaModal);
            if (status) {
                localStorage.setItem(chave, 'true');
            } else {
                localStorage.removeItem(chave);
            }
            
            closeModal();
            renderizarCalendarioMensal();
            verificarCheckinDiario();
        }

        window.onload = () => {
            formatarData();
            const treinoDoDia = obterTreinoDoDia();
            renderizarTreino(letraTreino);
        };
    </script>
</body>
</html>
